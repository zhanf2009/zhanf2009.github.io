        /* --- 新增：高级动态流光系统 --- */
        .bg-ambient {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -2;
            overflow: hidden;
            background-color: #f5f5f7; /* 极简浅灰底色 */
            transition: background-color 0.5s ease;
        }
        body.dark .bg-ambient {
            background-color: #0a0a0f; /* 深邃暗夜底色 */
        }

        /* 噪点遮罩层：消除色阶断层，提升“苹果级”质感的灵魂 */
        .bg-noise {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
            opacity: 0.05;
            /* background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); */
            background-image: url('./img/bg.svg');
        }
        body.dark .bg-noise {
            opacity: 0.08;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px); /* 强力高斯模糊形成流光 */
            opacity: 0.8;
            will-change: transform;
            animation: floatOrb 25s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.dark .bg-orb {
            opacity: 0.45; /* 暗色模式下降低亮度，避免刺眼 */
            filter: blur(100px);
        }

        /* 浅色流光配置 (高级莫兰迪色系) */
        .orb-1 { width: 50vw; height: 50vw; background: #dcd0ff; top: -10%; left: -10%; animation-duration: 22s; }
        .orb-2 { width: 60vw; height: 60vw; background: #b4d8ff; bottom: -20%; right: -10%; animation-duration: 28s; animation-delay: -5s; }

        .orb-4 { width: 40vw; height: 40vw; background: #ffe0f0; bottom: 10%; left: -10%; animation-duration: 30s; animation-delay: -15s; }

    <script>
        (function() {
            const audioEl = document.getElementById('bg-music');
            let playAttempted = false;

            function attemptAutoPlay() {
                if (!audioEl || playAttempted) return;
                audioEl.volume = 0.55;
                audioEl.play().then(() => {
                    playAttempted = true;
                }).catch(err => {
                    console.log("autoplay blocked, waiting for user gesture");
                });
            }
            attemptAutoPlay();

            const resumePlayOnInteraction = () => {
                if (!audioEl.paused && audioEl.currentTime > 0) return;
                audioEl.play().catch(e => console.log("resume failed", e));
                window.removeEventListener('touchstart', resumePlayOnInteraction);
                window.removeEventListener('click', resumePlayOnInteraction);
            };
            if (audioEl && audioEl.paused) {
                window.addEventListener('touchstart', resumePlayOnInteraction, { once: true });
                window.addEventListener('click', resumePlayOnInteraction, { once: true });
            }

            const themeToggle = document.getElementById('themeToggleCorner');
            const themeIconSpan = document.getElementById('themeIcon');
            const DARK_CLASS = 'dark';

            function setTheme(theme) {
                const isDark = theme === 'dark';
                if (isDark) {
                    document.body.classList.add(DARK_CLASS);
                    themeIconSpan.innerText = '🌙';
                } else {
                    document.body.classList.remove(DARK_CLASS);
                    themeIconSpan.innerText = '☀️';
                }
                localStorage.setItem('kulao_theme', theme);
            }

            function toggleTheme() {
                const currentIsDark = document.body.classList.contains(DARK_CLASS);
                if (currentIsDark) {
                    setTheme('light');
                } else {
                    setTheme('dark');
                }
            }

            const savedTheme = localStorage.getItem('kulao_theme');
            if (savedTheme === 'dark') {
                setTheme('dark');
            } else if (savedTheme === 'light') {
                setTheme('light');
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                setTheme('dark');
            } else {
                setTheme('light');
            }
            themeToggle.addEventListener('click', toggleTheme);

            // 书签折叠切换
            window.toggleBookmark = function(headerElement) {
                const bookmark = headerElement.closest('.bookmark');
                if (!bookmark) return;
                const links = bookmark.querySelector('.bookmark-links');
                if (!links) return;
                
                const isCurrentlyCollapsed = headerElement.classList.contains('collapsed');
                
                if (isCurrentlyCollapsed) {
                    headerElement.classList.remove('collapsed');
                    links.classList.remove('collapsed');
                } else {
                    headerElement.classList.add('collapsed');
                    links.classList.add('collapsed');
                }
                
                // 保存状态到 localStorage
                const bookmarkId = Array.from(bookmark.parentElement.children).indexOf(bookmark);
                localStorage.setItem(`bookmark_${bookmarkId}`, !isCurrentlyCollapsed);
            };

            // 初始化书签状态（默认折叠）
            function initializeBookmarks() {
                const bookmarks = document.querySelectorAll('.bookmark');
                bookmarks.forEach((bookmark, index) => {
                    const storedState = localStorage.getItem(`bookmark_${index}`);
                    const header = bookmark.querySelector('.bookmark-header');
                    const links = bookmark.querySelector('.bookmark-links');
                    if (!header || !links) return;
                    
                    // 默认折叠（true = 折叠）
                    let isCollapsed = true;
                    if (storedState !== null) {
                        isCollapsed = storedState === 'true';
                    } else {
                        localStorage.setItem(`bookmark_${index}`, 'true');
                        isCollapsed = true;
                    }
                    
                    if (isCollapsed) {
                        header.classList.add('collapsed');
                        links.classList.add('collapsed');
                    } else {
                        header.classList.remove('collapsed');
                        links.classList.remove('collapsed');
                    }
                });
            }

            initializeBookmarks();
        })();
    </script>
